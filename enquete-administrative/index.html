<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquête Administrative - Outil Professionnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
        }

        h2 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            position: relative;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            padding: 20px;
            border-radius: 12px;
            border: 2px solid;
        }

        .stat-card.delais {
            background: #dcfce7;
            border-color: #86efac;
        }

        .stat-card.delais.alert {
            background: #fed7aa;
            border-color: #fdba74;
        }

        .stat-card.delais.danger {
            background: #fecaca;
            border-color: #fca5a5;
        }

        .stat-card.personnes {
            background: #dbeafe;
            border-color: #93c5fd;
        }

        .stat-card.elements {
            background: #e9d5ff;
            border-color: #d8b4fe;
        }

        .stat-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stat-subtitle {
            font-size: 13px;
            color: #6b7280;
        }

        .etapes-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .etape-btn {
            padding: 12px 20px;
            background: #f3f4f6;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .etape-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }

        .etape-btn:hover:not(.active) {
            background: #e5e7eb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .form-label .required {
            color: #ef4444;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-control.error {
            border-color: #ef4444;
        }

        textarea.form-control {
            resize: vertical;
            font-family: inherit;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid;
        }

        .alert-warning {
            background: #fef3c7;
            border-color: #fbbf24;
            color: #92400e;
        }

        .alert-info {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }

        .alert-success {
            background: #d1fae5;
            border-color: #34d399;
            color: #065f46;
        }

        .card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            background: #f9fafb;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
        }

        .btn-remove {
            padding: 6px 12px;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-remove:hover {
            background: #fecaca;
        }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .manquements-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .tag {
            display: inline-block;
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            margin: 4px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            padding: 12px;
            background: #ede9fe;
            border-radius: 8px;
        }

        .last-save {
            text-align: center;
            font-size: 12px;
            color: #6b7280;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }

        details {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e5e7eb;
        }

        summary {
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
        }

        summary:hover {
            color: #764ba2;
        }

        .questions-models {
            background: #ede9fe;
            border: 2px solid #c4b5fd;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .manquements-grid {
                grid-template-columns: 1fr;
            }

            .etapes-nav {
                flex-direction: column;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- En-tête -->
        <div class="panel">
            <div class="header-actions">
                <div>
                    <h1>📋 Enquête Administrative</h1>
                    <p style="color: #6b7280;">Outil professionnel de conduite d'enquête pour les collectivités territoriales</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-success" onclick="sauvegarderManuellement()">
                        💾 Sauvegarder
                    </button>
                    <button class="btn btn-secondary" onclick="nouvelleEnquete()">
                        📄 Nouvelle enquête
                    </button>
                </div>
            </div>

            <!-- Barre de progression -->
            <div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 14px; color: #6b7280;">Progression de l'enquête</span>
                    <span style="font-size: 14px; font-weight: 600;" id="progressPercentage">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Statistiques -->
            <div class="stats-grid">
                <div class="stat-card delais" id="delaisCard">
                    <div class="stat-title">⏱️ Délais</div>
                    <div class="stat-value" id="joursEcoules">0 jours</div>
                    <div class="stat-subtitle" id="joursRestants">-</div>
                </div>
                <div class="stat-card personnes">
                    <div class="stat-title">👥 Personnes</div>
                    <div class="stat-value" id="nbPersonnes">0 concernées</div>
                    <div class="stat-subtitle" id="nbTemoins">0 témoins</div>
                </div>
                <div class="stat-card elements">
                    <div class="stat-title">📄 Éléments</div>
                    <div class="stat-value" id="nbAuditions">0 auditions</div>
                    <div class="stat-subtitle" id="nbDocuments">0 documents</div>
                </div>
            </div>

            <div class="last-save" id="lastSave">Aucune sauvegarde</div>
        </div>

        <!-- Navigation par étapes -->
        <div class="panel">
            <div class="etapes-nav" id="etapesNav"></div>
        </div>

        <!-- Contenu des étapes -->
        <div class="panel">
            <div id="etapeContent"></div>
            
            <!-- Navigation -->
            <div class="navigation">
                <button class="btn btn-secondary" id="btnPrev" onclick="prevEtape()">← Précédent</button>
                <button class="btn btn-primary" id="btnNext" onclick="nextEtape()">Suivant →</button>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let etapeActive = 0;
        let derniereSauvegarde = null;
        let intervalSauvegarde = null;

        const etapes = [
            { titre: "Contexte", requis: true },
            { titre: "Personnes concernées", requis: true },
            { titre: "Chronologie des faits", requis: true },
            { titre: "Preuves", requis: false },
            { titre: "Auditions", requis: true },
            { titre: "Témoins", requis: false },
            { titre: "Qualification juridique", requis: true },
            { titre: "Analyse", requis: true },
            { titre: "Conclusions", requis: true }
        ];

        let donnees = {
            contexte: {
                collectivite: '',
                dateOuverture: '',
                objet: '',
                origineSignalement: '',
                serviceConcerne: '',
                degresUrgence: 'normal',
                numeroEnquete: ''
            },
            personnesConcernees: [],
            faitsAllegues: '',
            chronologie: [],
            documentsRecueillis: [],
            auditions: [],
            temoins: [],
            analyse: '',
            qualificationJuridique: {
                manquementsIdentifies: [],
                textesApplicables: [],
                jurisprudence: ''
            },
            conclusions: '',
            recommandations: '',
            mesuresDisciplinaires: '',
            notesPrivees: '',
            statut: 'en_cours'
        };

        const manquementsPossibles = [
            "Manquement à l'obligation de service",
            "Absence injustifiée",
            "Retard répété",
            "Insubordination",
            "Défaut de probité",
            "Harcèlement moral",
            "Harcèlement sexuel",
            "Discrimination",
            "Conflit d'intérêts",
            "Prise illégale d'intérêt",
            "Manquement au devoir de neutralité",
            "Manquement au devoir de réserve",
            "Détournement de fonds publics",
            "Utilisation abusive de biens publics",
            "Divulgation d'informations confidentielles",
            "Cumul irrégulier d'activités",
            "Faute technique",
            "Manquement au respect de la hiérarchie",
            "Comportement inapproprié",
            "Violation du règlement intérieur"
        ];

        const questionsTypeAudition = {
            "Contexte": [
                "Pouvez-vous décrire votre fonction et vos responsabilités ?",
                "Depuis combien de temps occupez-vous ce poste ?",
                "Quelles sont vos relations professionnelles avec la personne concernée ?"
            ],
            "Faits": [
                "Pouvez-vous relater les faits dont vous avez connaissance ?",
                "À quelle date et dans quelles circonstances ces faits se sont-ils produits ?",
                "Avez-vous été témoin direct de ces faits ?",
                "Qui d'autre était présent ?"
            ],
            "Preuves": [
                "Disposez-vous d'éléments écrits ou matériels relatifs à ces faits ?",
                "Avez-vous conservé des échanges (courriels, messages) ?",
                "Existe-t-il des documents attestant de ces faits ?"
            ],
            "Conséquences": [
                "Quelles ont été les conséquences de ces faits ?",
                "Y a-t-il eu un impact sur le service ?",
                "D'autres agents ont-ils été affectés ?"
            ]
        };

        // Initialisation
        window.onload = function() {
            chargerSauvegarde();
            renderEtapesNav();
            renderEtape();
            updateStats();
            demarrerSauvegardeAuto();
        };

        // Sauvegarde automatique
        function demarrerSauvegardeAuto() {
            intervalSauvegarde = setInterval(() => {
                sauvegarder();
            }, 30000);
        }

        function sauvegarder() {
            try {
                localStorage.setItem('enquete_en_cours', JSON.stringify(donnees));
                derniereSauvegarde = new Date();
                document.getElementById('lastSave').textContent = 
                    `Dernière sauvegarde : ${derniereSauvegarde.toLocaleTimeString('fr-FR')}`;
            } catch (e) {
                console.error('Erreur de sauvegarde:', e);
            }
        }

        function sauvegarderManuellement() {
            sauvegarder();
            alert('✅ Enquête sauvegardée avec succès !');
        }

        function chargerSauvegarde() {
            try {
                const sauvegarde = localStorage.getItem('enquete_en_cours');
                if (sauvegarde) {
                    if (confirm('Une enquête en cours a été trouvée. Voulez-vous la restaurer ?')) {
                        donnees = JSON.parse(sauvegarde);
                        alert('✅ Enquête restaurée !');
                    }
                }
            } catch (e) {
                console.error('Erreur de chargement:', e);
            }
        }

        function nouvelleEnquete() {
            if (confirm('Êtes-vous sûr de vouloir démarrer une nouvelle enquête ? Les données actuelles seront perdues si non sauvegardées.')) {
                localStorage.removeItem('enquete_en_cours');
                location.reload();
            }
        }

        function calculerDelais() {
            if (!donnees.contexte.dateOuverture) return null;
            
            const dateOuverture = new Date(donnees.contexte.dateOuverture);
            const maintenant = new Date();
            const joursEcoules = Math.floor((maintenant - dateOuverture) / (1000 * 60 * 60 * 24));
            const delaiRecommande = 60;
            const joursRestants = delaiRecommande - joursEcoules;
            
            return {
                joursEcoules,
                joursRestants,
                alerte: joursRestants < 15,
                depassement: joursRestants < 0
            };
        }

        function calculerProgression() {
            let score = 0;
            if (donnees.contexte.collectivite && donnees.contexte.dateOuverture) score++;
            if (donnees.personnesConcernees.length > 0) score++;
            if (donnees.faitsAllegues) score++;
            if (donnees.documentsRecueillis.length > 0) score++;
            if (donnees.auditions.length > 0) score++;
            if (donnees.qualificationJuridique.manquementsIdentifies.length > 0) score++;
            if (donnees.analyse) score++;
            if (donnees.conclusions) score++;
            return Math.round((score / 8) * 100);
        }

        function updateStats() {
            const prog = calculerProgression();
            document.getElementById('progressBar').style.width = prog + '%';
            document.getElementById('progressPercentage').textContent = prog + '%';

            const delais = calculerDelais();
            if (delais) {
                document.getElementById('joursEcoules').textContent = delais.joursEcoules + ' jours écoulés';
                document.getElementById('joursRestants').textContent = 
                    delais.depassement 
                        ? `Dépassement de ${Math.abs(delais.joursRestants)} jours`
                        : `${delais.joursRestants} jours restants`;
                
                const card = document.getElementById('delaisCard');
                card.className = 'stat-card delais';
                if (delais.depassement) card.className += ' danger';
                else if (delais.alerte) card.className += ' alert';
            }

            document.getElementById('nbPersonnes').textContent = 
                donnees.personnesConcernees.length + ' concernées';
            document.getElementById('nbTemoins').textContent = 
                donnees.temoins.length + ' témoins';

            document.getElementById('nbAuditions').textContent = 
                donnees.auditions.length + ' auditions';
            document.getElementById('nbDocuments').textContent = 
                donnees.documentsRecueillis.length + ' documents';
        }

        function renderEtapesNav() {
            const nav = document.getElementById('etapesNav');
            nav.innerHTML = '';
            
            etapes.forEach((etape, index) => {
                const btn = document.createElement('button');
                btn.className = 'etape-btn' + (index === etapeActive ? ' active' : '');
                btn.textContent = `${index + 1}. ${etape.titre}${etape.requis ? ' *' : ''}`;
                btn.onclick = () => {
                    etapeActive = index;
                    renderEtapesNav();
                    renderEtape();
                };
                nav.appendChild(btn);
            });
        }

        function prevEtape() {
            if (etapeActive > 0) {
                etapeActive--;
                renderEtapesNav();
                renderEtape();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function nextEtape() {
            if (etapeActive < etapes.length - 1) {
                etapeActive++;
                renderEtapesNav();
                renderEtape();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function renderEtape() {
            const content = document.getElementById('etapeContent');
            
            document.getElementById('btnPrev').disabled = (etapeActive === 0);
            document.getElementById('btnNext').disabled = (etapeActive === etapes.length - 1);

            switch(etapeActive) {
                case 0: renderContexte(); break;
                case 1: renderPersonnes(); break;
                case 2: renderChronologie(); break;
                case 3: renderPreuves(); break;
                case 4: renderAuditions(); break;
                case 5: renderTemoins(); break;
                case 6: renderQualification(); break;
                case 7: renderAnalyse(); break;
                case 8: renderConclusions(); break;
            }
            
            updateStats();
        }

        // ÉTAPE 0: CONTEXTE
        function renderContexte() {
            document.getElementById('etapeContent').innerHTML = `
                <h2>Contexte de l'enquête</h2>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Numéro d'enquête (optionnel)</label>
                        <input type="text" class="form-control" id="numeroEnquete" 
                            value="${donnees.contexte.numeroEnquete}" 
                            placeholder="EQ-2025-001">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Degré d'urgence</label>
                        <select class="form-control" id="degresUrgence">
                            <option value="faible" ${donnees.contexte.degresUrgence === 'faible' ? 'selected' : ''}>Faible</option>
                            <option value="normal" ${donnees.contexte.degresUrgence === 'normal' ? 'selected' : ''}>Normal</option>
                            <option value="urgent" ${donnees.contexte.degresUrgence === 'urgent' ? 'selected' : ''}>Urgent</option>
                            <option value="tres_urgent" ${donnees.contexte.degresUrgence === 'tres_urgent' ? 'selected' : ''}>Très urgent</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Collectivité territoriale <span class="required">*</span></label>
                    <input type="text" class="form-control" id="collectivite" 
                        value="${donnees.contexte.collectivite}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Date d'ouverture de l'enquête <span class="required">*</span></label>
                    <input type="date" class="form-control" id="dateOuverture" 
                        value="${donnees.contexte.dateOuverture}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Objet de l'enquête <span class="required">*</span></label>
                    <textarea class="form-control" id="objet" rows="3" required>${donnees.contexte.objet}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Origine du signalement <span class="required">*</span></label>
                    <select class="form-control" id="origineSignalement" required>
                        <option value="">Sélectionner...</option>
                        <option value="Agent" ${donnees.contexte.origineSignalement === 'Agent' ? 'selected' : ''}>Agent</option>
                        <option value="Élu" ${donnees.contexte.origineSignalement === 'Élu' ? 'selected' : ''}>Élu</option>
                        <option value="Référent déontologue" ${donnees.contexte.origineSignalement === 'Référent déontologue' ? 'selected' : ''}>Référent déontologue</option>
                        <option value="Inspection" ${donnees.contexte.origineSignalement === 'Inspection' ? 'selected' : ''}>Inspection</option>
                        <option value="Autorité hiérarchique" ${donnees.contexte.origineSignalement === 'Autorité hiérarchique' ? 'selected' : ''}>Autorité hiérarchique</option>
                        <option value="Syndicat" ${donnees.contexte.origineSignalement === 'Syndicat' ? 'selected' : ''}>Syndicat</option>
                        <option value="Externe" ${donnees.contexte.origineSignalement === 'Externe' ? 'selected' : ''}>Externe (usager, tiers)</option>
                        <option value="Anonyme" ${donnees.contexte.origineSignalement === 'Anonyme' ? 'selected' : ''}>Anonyme</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Service concerné</label>
                    <input type="text" class="form-control" id="serviceConcerne" 
                        value="${donnees.contexte.serviceConcerne}">
                </div>
            `;

                    <div class="alert alert-success">
                        <strong>📝 Conseil :</strong> Synthèse factuelle et juridique. Répondre clairement aux questions posées. 
                        Indiquer si les faits sont établis, partiellement établis ou non établis.
                    </div>
                    <textarea class="form-control" id="conclusions" rows="8" 
                        placeholder="Rédiger les conclusions de l'enquête...">${donnees.conclusions}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Recommandations <span class="required">*</span></label>
                    <div class="alert alert-info">
                        <strong>💡 Conseil :</strong> Proposer des mesures : disciplinaires, organisationnelles, préventives, de formation, etc.
                    </div>
                    <textarea class="form-control" id="recommandations" rows="8" 
                        placeholder="Formuler les recommandations...">${donnees.recommandations}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Mesures disciplinaires préconisées (optionnel)</label>
                    <textarea class="form-control" id="mesuresDisciplinaires" rows="5" 
                        placeholder="Sanctions disciplinaires préconisées...">${donnees.mesuresDisciplinaires}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Statut de l'enquête</label>
                    <select class="form-control" id="statut">
                        <option value="en_cours" ${donnees.statut === 'en_cours' ? 'selected' : ''}>En cours</option>
                        <option value="cloturee" ${donnees.statut === 'cloturee' ? 'selected' : ''}>Clôturée</option>
                        <option value="suspendue" ${donnees.statut === 'suspendue' ? 'selected' : ''}>Suspendue</option>
                        <option value="classee_sans_suite" ${donnees.statut === 'classee_sans_suite' ? 'selected' : ''}>Classée sans suite</option>
                    </select>
                </div>

                <button class="btn btn-success" onclick="genererRapport()" style="width: 100%; padding: 20px; font-size: 18px; margin-top: 20px;">
                    📥 Télécharger le rapport d'enquête complet
                </button>
            `;

            document.getElementById('conclusions').oninput = (e) => { donnees.conclusions = e.target.value; sauvegarder(); updateStats(); };
            document.getElementById('recommandations').oninput = (e) => { donnees.recommandations = e.target.value; sauvegarder(); updateStats(); };
            document.getElementById('mesuresDisciplinaires').oninput = (e) => { donnees.mesuresDisciplinaires = e.target.value; sauvegarder(); };
            document.getElementById('statut').onchange = (e) => { donnees.statut = e.target.value; sauvegarder(); };
        }

        // Génération du rapport
        function genererRapport() {
            const delais = calculerDelais();
            
            const rapport = `
═══════════════════════════════════════════════════════════════
              RAPPORT D'ENQUÊTE ADMINISTRATIVE
═══════════════════════════════════════════════════════════════

Référence: ${donnees.contexte.numeroEnquete || 'N/A'}
Date du rapport: ${new Date().toLocaleDateString('fr-FR', { 
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
})}
Statut: ${donnees.statut === 'en_cours' ? 'EN COURS' : donnees.statut === 'cloturee' ? 'CLÔTURÉE' : donnees.statut === 'suspendue' ? 'SUSPENDUE' : 'CLASSÉE SANS SUITE'}

───────────────────────────────────────────────────────────────
I. CONTEXTE DE L'ENQUÊTE
───────────────────────────────────────────────────────────────

Collectivité territoriale: ${donnees.contexte.collectivite}
Date d'ouverture: ${donnees.contexte.dateOuverture ? new Date(donnees.contexte.dateOuverture).toLocaleDateString('fr-FR') : 'Non renseignée'}
${delais ? `Durée de l'enquête: ${delais.joursEcoules} jours` : ''}
Objet: ${donnees.contexte.objet}
Origine du signalement: ${donnees.contexte.origineSignalement}
Service concerné: ${donnees.contexte.serviceConcerne}
Degré d'urgence: ${donnees.contexte.degresUrgence}

───────────────────────────────────────────────────────────────
II. PERSONNES CONCERNÉES
───────────────────────────────────────────────────────────────

${donnees.personnesConcernees.map((p, i) => `
${i + 1}. ${p.prenom} ${p.nom}
   Statut: ${p.statut}
   Fonction: ${p.fonction}
   Date de notification: ${p.dateNotification ? new Date(p.dateNotification).toLocaleDateString('fr-FR') : 'Non notifié'}
   ${p.dateAccusReception ? `Accusé de réception: ${new Date(p.dateAccusReception).toLocaleDateString('fr-FR')}` : ''}
`).join('\n')}

───────────────────────────────────────────────────────────────
III. CHRONOLOGIE DES FAITS
───────────────────────────────────────────────────────────────

${donnees.chronologie.length > 0 ? donnees.chronologie.map((evt, i) => `
${i + 1}. ${evt.date ? new Date(evt.date).toLocaleDateString('fr-FR') : '[Date]'} ${evt.heure ? `à ${evt.heure}` : ''}
   Lieu: ${evt.lieu}
   Description: ${evt.description}
`).join('\n') : 'Aucun événement enregistré'}

Description générale des faits allégués:
${donnees.faitsAllegues}

───────────────────────────────────────────────────────────────
IV. ÉLÉMENTS DE PREUVE RECUEILLIS
───────────────────────────────────────────────────────────────

${donnees.documentsRecueillis.map((d, i) => `
${i + 1}. ${d.type} - Référence: ${d.reference}
   Date de recueil: ${d.dateRecueil ? new Date(d.dateRecueil).toLocaleDateString('fr-FR') : 'Non datée'}
   Valeur probante: ${d.valeurProbante || 'Non évaluée'}
   Description: ${d.description}
`).join('\n')}

───────────────────────────────────────────────────────────────
V. AUDITIONS RÉALISÉES
───────────────────────────────────────────────────────────────

${donnees.auditions.map((a, i) => `
${i + 1}. Audition du ${a.date ? new Date(a.date).toLocaleDateString('fr-FR') : '[Date]'}
   Personne: ${a.personne} - ${a.qualite}
   Lieu: ${a.lieu}
   
   Synthèse des déclarations:
   ${a.declarationsSynthese}
`).join('\n')}

───────────────────────────────────────────────────────────────
VI. TÉMOIGNAGES
───────────────────────────────────────────────────────────────

${donnees.temoins.length > 0 ? donnees.temoins.map((t, i) => `
${i + 1}. ${t.prenom} ${t.nom}
   Fonction: ${t.fonction}
   Fiabilité: ${t.fiabilite}
   
   Synthèse: ${t.synthese}
`).join('\n') : 'Aucun témoin entendu'}

───────────────────────────────────────────────────────────────
VII. QUALIFICATION JURIDIQUE
───────────────────────────────────────────────────────────────

A. Manquements identifiés:
${donnees.qualificationJuridique.manquementsIdentifies.length > 0 
  ? donnees.qualificationJuridique.manquementsIdentifies.map((m, i) => `   ${i + 1}. ${m}`).join('\n')
  : '   Aucun manquement identifié'}

B. Textes applicables:
${donnees.qualificationJuridique.textesApplicables.length > 0
  ? donnees.qualificationJuridique.textesApplicables.map((t, i) => `   ${i + 1}. ${t}`).join('\n')
  : '   Aucun texte référencé'}

C. Jurisprudence:
${donnees.qualificationJuridique.jurisprudence || 'Non renseignée'}

───────────────────────────────────────────────────────────────
VIII. ANALYSE JURIDIQUE
───────────────────────────────────────────────────────────────

${donnees.analyse}

───────────────────────────────────────────────────────────────
IX. CONCLUSIONS
───────────────────────────────────────────────────────────────

${donnees.conclusions}

───────────────────────────────────────────────────────────────
X. RECOMMANDATIONS
───────────────────────────────────────────────────────────────

${donnees.recommandations}

${donnees.mesuresDisciplinaires ? `
───────────────────────────────────────────────────────────────
XI. MESURES DISCIPLINAIRES PRÉCONISÉES
───────────────────────────────────────────────────────────────

${donnees.mesuresDisciplinaires}
` : ''}

═══════════════════════════════════════════════════════════════
                        FIN DU RAPPORT
═══════════════════════════════════════════════════════════════

Rapport établi conformément aux principes du droit administratif 
et dans le respect des droits de la défense et du contradictoire.

Date de génération: ${new Date().toLocaleString('fr-FR')}
            `.trim();

            const blob = new Blob([rapport], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const nomFichier = `Rapport_Enquete_${donnees.contexte.numeroEnquete || 'N'}_${donnees.contexte.collectivite.replace(/\s/g, '_')}_${new Date().toISOString().split('T')[0]}.txt`;
            a.download = nomFichier;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
